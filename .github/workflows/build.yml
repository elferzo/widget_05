name: Build APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
 
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
 
      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
 
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias marketwidget \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass market123 -keypass market123 \
            -dname "CN=MarketWidget, OU=App, O=Market, L=Moscow, ST=Moscow, C=RU"
 
      - name: Debug - list files
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== app/ ==="
          ls -la app/
          echo "=== settings.gradle ==="
          cat settings.gradle
          echo "=== build.gradle ==="
          cat build.gradle
          echo "=== app/build.gradle ==="
          cat app/build.gradle
          echo "=== gradle.properties ==="
          cat gradle.properties
 
      - name: Build Signed APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=market123 \
            -Pandroid.injected.signing.key.alias=marketwidget \
            -Pandroid.injected.signing.key.password=market123 \
            --info --stacktrace
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MarketWidget-release
          path: app/build/outputs/apk/release/app-release.apk
 
